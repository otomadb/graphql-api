name: otomad-database-api-test
version: "3.9"

services:
  postgres:
    image: postgres:15@sha256:ea40a028dd42740d6cff34135ff6b3119ff7ce0ed60120d992216456b5987fe7
    ports:
      - target: 5432
        published: 35432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: test

  # postgres-migration:
  #   build:
  #     context: ./.
  #     dockerfile: Dockerfile.migration
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     PRISMA_DATABASE_URL: "postgres://user:pass@postgres:5432/test"

  neo4j:
    image: neo4j:5.18@sha256:dc15e0f234af44fb514a8ff8ff7b491cba046b07f4201ad4399b69ef92a81aea
    ports:
      - target: 7687
        published: 37687
    environment:
      NEO4J_AUTH: neo4j/password

  redis:
    image: redis:7.2@sha256:3134997edb04277814aa51a4175a588d45eb4299272f8eff2307bbf8b39e4d43
    ports:
      - target: 6379
        published: 36379
